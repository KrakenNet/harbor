# SPDX-License-Identifier: Apache-2.0
#
# Phase-3 task 3.26 fixture: CVE-triage IR with the canonical real
# :class:`harbor.nodes.nautilus.BrokerNode`. This is the
# production-equivalent shape used as the "contrast" composition variant
# in `test_nautilus_composition.py` (the stub-broker fixture mirrors
# this layout, swapping the broker for `StubBrokerNode`).
#
# Topology (linear):
#
#   source -> retrieve_kv -> broker -> ml_score -> dspy_summary -> clips_route
#       -> approval_gate (interrupt) -> write_record (artifact) -> action
#
# Phase-5 task 5.1 (validation-gate IR) lands the full canonical CVE-triage
# IR with the matching node-config blocks (DSPy module / CLIPS module /
# ML model id), per FR-58 + AC-11.5. This fixture is the structural
# skeleton; the validation gate refines the per-node IR fields when the
# real configs land. Task 3.26 only needs the topology to drive the
# composition test through HITL + artifact, so the per-node config blocks
# are deferred.
ir_version: "1.0.0"
id: "run:cve-triage-real-nautilus"
nodes:
  - id: source
    kind: passthrough
  - id: retrieve_kv
    kind: passthrough
  - id: broker
    kind: broker
  - id: ml_score
    kind: passthrough
  - id: dspy_summary
    kind: passthrough
  - id: clips_route
    kind: passthrough
  - id: write_record
    kind: write_artifact
  - id: approval_gate
    kind: interrupt
  - id: action
    kind: passthrough
state_schema:
  agent_id: str
  intent: str
  cve_record_bytes: bytes
