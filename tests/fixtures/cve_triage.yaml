# SPDX-License-Identifier: Apache-2.0
#
# Phase-5 task 5.1 (validation-gate): full canonical CVE-triage +
# remediation pipeline IR per design §13.1. This is the IR the Phase-5
# E2E validation gate (task 5.3) drives end-to-end through `harbor serve`
# under the cleared profile.
#
# Topology (per design §13.1):
#
#   ingest -> retrieve_kv -> broker -> ml_score -> dspy_summary
#       -> clips_route -> dspy_remed -> human_gate (interrupt)
#       -> branch_resp -> [approve] write_art -> action
#                       \-[reject] action(drop)
#
# Node-kind dictionary (this YAML's `kind` strings):
#
#   passthrough     -- ingest / retrieve_kv / ml_score / dspy_summary /
#                      clips_route / dspy_remed / branch_resp / action
#                      (POC-runtime-resolvable; the validation-gate E2E
#                      test substitutes per-node behavior via lifespan
#                      contextvars + stub registrations -- see task 5.3).
#   broker          -- harbor.nodes.nautilus.BrokerNode (production wiring);
#                      the E2E test swaps in `StubBrokerNode` via the
#                      `current_broker` contextvar singleton override.
#   interrupt       -- harbor.nodes.interrupt.InterruptNode -- HITL gate.
#   write_artifact  -- harbor.nodes.artifacts.WriteArtifactNode -- emits
#                      the remediation-package ArtifactRef.
#
# Why bare `kind` strings instead of fully-qualified class paths
# (`harbor.nodes.nautilus.BrokerNode`)? `harbor.ir._models.NodeSpec.kind`
# is a free-form `str` resolved by the runtime's node-factory registry
# (see `harbor.cli.run._NODE_FACTORIES` for the POC echo/halt/dspy path
# and `harbor.serve.lifecycle` for the production registration). The
# fully-qualified class path is the registry KEY, not the IR string.
# The composition variants (`cve_triage_real_nautilus.yaml`,
# `cve_triage_no_nautilus.yaml`, `cve_triage_stub_broker.yaml`) use the
# same `kind: broker` convention; this fixture extends them with the full
# 11-node sequence and the 4 mandatory Bosun pack mounts.
#
# Bosun packs (4 mandatory per AC-11.1, design §7.1):
#   - harbor.bosun.budgets    (FR-37)  -- per-run + per-tool spend caps
#   - harbor.bosun.audit      (FR-38)  -- single-sink audit fact promotion
#   - harbor.bosun.safety_pii (FR-37)  -- starter PII deny rules
#   - harbor.bosun.retries    (FR-37)  -- retry-action heuristics
# All mounted with `requires.{harbor_facts_version, api_version}` blocks
# per FR-39/FR-40 -- pack-load fails on version drift, never silently.
#
# Capabilities declared (`tools` lookups for capability-gate factory):
#   tools:broker_request   -- BrokerNode -> Nautilus broker_request tool
#   runs:respond           -- HITL gate -> POST /runs/{id}/respond
#   artifacts:write        -- WriteArtifactNode -> ArtifactStore.write
# The IR `tools` block lists tool refs whose specs the registry resolves
# at run-start; capability gating fires per ToolSpec.permissions.
#
# Counterfactual scenarios driving against this fixture (FR-56,
# design §13.3):
#   (a) `mutation.tool_outputs[step_broker]` -- BrokerResponse re-rank
#       (`test_counterfactual_broker_mutation.py`).
#   (b) `mutation.respond_payloads[step_human_gate] = {"decision":
#       "reject"}` -- analyst-rejection branch
#       (`test_counterfactual_respond_rejection.py`).
#
# IR-load + structural-hash stability is the Done-when criterion (task
# 5.1). End-to-end pipeline execution is task 5.3.
ir_version: "1.0.0"
id: "run:cve-triage-remediation"
nodes:
  - id: ingest
    kind: passthrough
  - id: retrieve_kv
    kind: passthrough
  - id: broker
    kind: broker
  - id: ml_score
    kind: passthrough
  - id: dspy_summary
    kind: passthrough
  - id: clips_route
    kind: passthrough
  - id: dspy_remed
    kind: passthrough
  - id: human_gate
    kind: interrupt
  - id: branch_resp
    kind: passthrough
  - id: write_art
    kind: write_artifact
  - id: action
    kind: passthrough
state_schema:
  agent_id: str
  intent: str
  cve_record_bytes: bytes
  feed_path: str
  cve_records: str
  retrieved_context: str
  severity_score: str
  cve_summary: str
  routing_decision: str
  remediation_proposal: str
  response_decision: str
  remediation_artifact: str
  action_outcome: str
tools:
  - id: broker_request
    version: "1.0"
governance:
  - id: harbor.bosun.budgets
    version: "1.0"
    requires:
      harbor_facts_version: "1.0"
      api_version: "1"
  - id: harbor.bosun.audit
    version: "1.0"
    requires:
      harbor_facts_version: "1.0"
      api_version: "1"
  - id: harbor.bosun.safety_pii
    version: "1.0"
    requires:
      harbor_facts_version: "1.0"
      api_version: "1"
  - id: harbor.bosun.retries
    version: "1.0"
    requires:
      harbor_facts_version: "1.0"
      api_version: "1"
rules:
  - id: r-ingest-to-retrieve
    when: "(initial-fact)"
    then:
      - kind: goto
        target: retrieve_kv
  - id: r-retrieve-to-broker
    when: "?n <- (node-id (id retrieve_kv))"
    then:
      - kind: goto
        target: broker
  - id: r-broker-to-ml
    when: "?n <- (node-id (id broker))"
    then:
      - kind: goto
        target: ml_score
  - id: r-ml-to-summary
    when: "?n <- (node-id (id ml_score))"
    then:
      - kind: goto
        target: dspy_summary
  - id: r-summary-to-route
    when: "?n <- (node-id (id dspy_summary))"
    then:
      - kind: goto
        target: clips_route
  - id: r-route-to-remed
    when: "?n <- (node-id (id clips_route))"
    then:
      - kind: goto
        target: dspy_remed
  - id: r-remed-to-gate
    when: "?n <- (node-id (id dspy_remed))"
    then:
      - kind: goto
        target: human_gate
  - id: r-gate-to-branch
    when: "?n <- (node-id (id human_gate))"
    then:
      - kind: interrupt
        prompt: "Approve remediation for {cve_id}?"
        interrupt_payload:
          requested_capability: "runs:respond"
        requested_capability: "runs:respond"
        timeout: "PT5M"
        on_timeout: "halt"
  - id: r-branch-approve
    when: "?n <- (node-id (id branch_resp)) (response (decision approve))"
    then:
      - kind: goto
        target: write_art
  - id: r-branch-reject
    when: "?n <- (node-id (id branch_resp)) (response (decision reject))"
    then:
      - kind: goto
        target: action
  - id: r-write-to-action
    when: "?n <- (node-id (id write_art))"
    then:
      - kind: goto
        target: action
  - id: r-halt-action
    when: "?n <- (node-id (id action))"
    then:
      - kind: halt
        reason: "CVE triage + remediation pipeline complete"
